<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TESE Cloud Ready</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0057b8, #00a2ff);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: rgba(0, 0, 0, 0.3);
            padding: 50px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        h2 {
            font-weight: 300;
            margin-bottom: 30px;
        }

        .cloud-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .btn {
            background: white;
            color: #0057b8;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        footer {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="cloud-icon">☁️</div>
    <h1>Sistema de Inscripciones TESE</h1>
    <h2>Próximamente en la Nube</h2>
    <a href="#" class="btn">Más Información</a>
    <footer>
        Proyecto Cloud Ready 2026 | Tecnologías Innovadoras
    </footer>
</div>

</body>
</html>
